
<script>

const STORAGE_KEY = "expense_tracker_v7";

let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

const RULES = [

  { match: "nezar mansy", reimb: true, category: "Client reimbursed" },

  { match: "capitol hill club", reimb: true, category: "Client reimbursed" },

  { match: "116 club", reimb: true, category: "Client reimbursed" },

  { match: "national democratic club", reimb: true, category: "Client reimbursed" }

];

function save() {

  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));

}

function importCSV() {

  document.getElementById("fileInput").click();

}

function handleFile(e) {

  const file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(evt) {

    parseCSV(evt.target.result);

  };

  reader.readAsText(file);

}

function parseCSV(text) {

  const lines = text.replace(/\r/g, "").split("\n").filter(l => l.trim());

  if (lines.length < 2) return;

  // FORCE TAB for Burke file

  const rows = lines.map(line => line.split("\t"));

  const headers = rows[0].map(h => h.trim().toLowerCase());

  const dateIdx = headers.indexOf("processed date");

  const descIdx = headers.indexOf("description");

  const typeIdx = headers.indexOf("credit or debit");

  const amountIdx = headers.indexOf("amount");

  if (dateIdx === -1 || descIdx === -1 || typeIdx === -1 || amountIdx === -1) {

    alert("Burke file not recognized");

    return;

  }

  let imported = 0;

  rows.slice(1).forEach(r => {

    const date = (r[dateIdx] || "").trim();

    const desc = (r[descIdx] || "").trim();

    const type = (r[typeIdx] || "").toLowerCase();

    let amount = parseFloat((r[amountIdx] || "").replace(/,/g, ""));

    if (!date || !desc || isNaN(amount)) return;

    // Apply debit/credit logic

    if (type.includes("debit")) amount = -Math.abs(amount);

    if (type.includes("credit")) amount = Math.abs(amount);

    let reimb = false;

    let category = "General";

    const lower = desc.toLowerCase();

    for (const rule of RULES) {

      if (lower.includes(rule.match)) {

        reimb = true;

        category = rule.category;

        break;

      }

    }

    transactions.push({

      date,

      desc,

      account: "Burke & Herbert",

      amount,

      reimb,

      category

    });

    imported++;

  });

  save();

  render();

  alert(imported + " transactions imported");

}

function render() {

  const tbody = document.querySelector("#table tbody");

  tbody.innerHTML = "";

  let total = 0;

  let reimb = 0;

  transactions.forEach(t => {

    if (t.amount < 0) {

      total += Math.abs(t.amount);

      if (t.reimb) reimb += Math.abs(t.amount);

    }

    tbody.innerHTML += `

      <tr>

        <td>${t.date}</td>

        <td>${t.desc}</td>

        <td>${t.account}</td>

        <td>${t.category}</td>

        <td>${t.reimb ? "Yes" : ""}</td>

        <td>${t.amount.toFixed(2)}</td>

      </tr>`;

  });

  document.getElementById("total").textContent = total.toFixed(2);

  document.getElementById("reimb").textContent = reimb.toFixed(2);

  document.getElementById("net").textContent = (total - reimb).toFixed(2);

}

function clearAll() {

  if (!confirm("Clear all data?")) return;

  transactions = [];

  save();

  render();

}

function exportData() {

  const blob = new Blob([JSON.stringify(transactions, null, 2)], { type: "application/json" });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;

  a.download = "expenses.json";

  a.click();

}

render();

</script>
