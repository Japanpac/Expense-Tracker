<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Expense Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body { font-family: -apple-system; margin:20px; background:#f5f5f7;}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#007aff; color:white;}

table { width:100%; border-collapse:collapse; background:white;}

td, th { padding:8px; border-bottom:1px solid #ddd;}

</style>

</head>

<body>

<h1>Expense Tracker</h1>

<button onclick="importCSV()">Import CSV</button>

<button onclick="exportData()">Export</button>

<button onclick="clearAll()">Clear</button>

<div>

Total: $<span id="total">0</span><br>

Reimb: $<span id="reimb">0</span><br>

Net: $<span id="net">0</span>

</div>

<table>

<thead>

<tr>

<th>Date</th><th>Description</th><th>Account</th><th>Category</th><th>Reimb</th><th>Amount</th>

</tr>

</thead>

<tbody id="rows"></tbody>

</table>

<input type="file" id="fileInput" style="display:none" onchange="handleFile(event)">

<script>
let data = JSON.parse(localStorage.getItem("exp")||"[]");

const RULES = [

{m:"nezar mansy",r:1},

{m:"capitol hill club",r:1},

{m:"116 club",r:1},

{m:"national democratic club",r:1}

];

function save(){localStorage.setItem("exp",JSON.stringify(data));}

function importCSV(){document.getElementById("fileInput").click();}

function handleFile(e){

let f=e.target.files[0];

let r=new FileReader();

r.onload=x=>parse(x.target.result);

r.readAsText(f);

}

function parse(t){

let lines=t.replace(/\r/g,"").split("\n").filter(l=>l.trim());

let rows=lines.map(l=>l.split("\t"));

let h=rows[0].map(x=>x.toLowerCase());

let d=h.indexOf("processed date");

let desc=h.indexOf("description");

let type=h.indexOf("credit or debit");

let amt=h.indexOf("amount");

if(d==-1||desc==-1||type==-1||amt==-1){

alert("Wrong file");

return;

}

rows.slice(1).forEach(r=>{

let date=r[d];

let de=r[desc];

let ty=(r[type]||"").toLowerCase();

let a=parseFloat((r[amt]||"").replace(/,/g,""));

if(!date||!de||isNaN(a))return;

if(ty.includes("debit"))a=-Math.abs(a);

if(ty.includes("credit"))a=Math.abs(a);

let reimb=0;

RULES.forEach(x=>{if(de.toLowerCase().includes(x.m))reimb=1;});

data.push({date,desc:de,amount:a,reimb});

});

save();render();

}function render(){

let t=0,r=0,out="";

data.forEach(x=>{

if(x.amount<0){

t+=Math.abs(x.amount);

if(x.reimb)r+=Math.abs(x.amount);

}

out+=`<tr>

<td>${x.date}</td>

<td>${x.desc}</td>

<td>Burke</td>

<td></td>

<td>${x.reimb?"Yes":""}</td>

<td>${x.amount.toFixed(2)}</td>

</tr>`;

});

document.getElementById("rows").innerHTML=out;

document.getElementById("total").innerText=t.toFixed(2);

document.getElementById("reimb").innerText=r.toFixed(2);

document.getElementById("net").innerText=(t-r).toFixed(2);

}

function clearAll(){

if(confirm("Clear all?")){

data=[];

save();

render();

}

}

function exportData(){

let blob=new Blob([JSON.stringify(data,null,2)]);

let url=URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;

a.download="data.json";

a.click();

}

render();

</script>

</body>

</html>
